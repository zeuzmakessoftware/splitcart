<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Splitcart — Swipe Your Groceries</title>
  <meta name="description"
    content="Swipe through grocery items to train your personal shopping recommendation model." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Background -->
  <div class="bg-layer">
    <div class="bg-glow bg-glow--orange"></div>
    <div class="bg-glow bg-glow--pink"></div>
  </div>

  <!-- App Shell (phone-like container) -->
  <div class="app-shell" id="appShell">

    <!-- Top Bar -->
    <header class="top-bar" id="topBar">
      <div class="top-bar__row">
        <header class="top-bar">
          <div class="left-actions">
            <button class="icon-btn" id="uploadBtn" aria-label="Upload Receipt">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </button>
            <button class="icon-btn" id="navSplitBtn" aria-label="View Split Results" style="display: none;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg>
            </button>
            <select class="user-select" id="userSelect">
              <option value="eva">Eva</option>
              <option value="john">John</option>
            </select>
            <input type="file" id="receiptInput" accept="image/*" style="display: none;" />
            <span class="app-title" id="appTitle">Splitcart</span>
          </div>
          <div class="stat-pills">
            <div class="stat-pill"><span class="stat-val" id="likedCountTop">0</span><span
                class="stat-label">LIKES</span></div>
            <div class="stat-pill"><span class="stat-val" id="remainingCountTop">0</span><span
                class="stat-label">LEFT</span></div>
          </div>
        </header>

        <main id="curationView">
          <div class="category-scroll" id="categoryScroll"></div>

          <div class="card-stack-wrapper" id="cardStackWrapper">
            <div class="welcome-view">
              <div class="welcome-icon">✧</div>
              <h1>Welcome to Splitcart</h1>
              <p>Upload a receipt to start curating your groceries.</p>
            </div>
          </div>

          <nav class="action-bar">
            <button class="action-btn" id="btn-undo" aria-label="Undo"><svg width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <polyline points="3 3 3 8 8 8" />
              </svg></button>
            <button class="action-btn" id="btn-pass" aria-label="Pass"><svg width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg></button>
            <button class="action-btn large" id="btn-love" aria-label="Love"><svg width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path
                  d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z" />
              </svg></button>
            <button class="action-btn" id="btn-like" aria-label="Like"><svg width="22" height="22" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5">
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
              </svg></button>
            <button class="action-btn" id="btn-save" aria-label="Save"><svg width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
              </svg></button>
          </nav>

          <nav class="bottom-tabs">
            <a href="#" class="tab-item active" id="tabSwipe">
              <div class="tab-icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2">
                  <path d="M18 8a3 3 0 0 0-3-3 3 3 0 0 0-3 3v8a3 3 0 0 1-3 3 3 3 0 0 1-3-3V4" />
                  <circle cx="18" cy="8" r="3" />
                  <circle cx="6" cy="4" r="3" />
                </svg><span class="badge">0</span></div><span>SWIPE</span>
            </a>
            <a href="#" class="tab-item">
              <div class="tab-icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2">
                  <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg></div><span>LIKES</span>
            </a>
            <a href="#" class="tab-item">
              <div class="tab-icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                </svg></div><span>SAVED</span>
            </a>
            <a href="#" class="tab-item">
              <div class="tab-icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.2">
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg></div><span>PASS</span>
            </a>
          </nav>
        </main>

        <main id="splitView" style="display: none;">
          <div class="split-view-header">
            <h1>Intelligent Split</h1>
            <p>Divided based on your learned profiles.</p>
          </div>
          <div class="split-results-container" id="splitResultsContainer">
            <!-- Injected by JS -->
          </div>
        </main>
      </div> <!-- end app-shell -->

      <script src="app.js"></script>
</body>

</html>
